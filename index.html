<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="KPSS Tarih Müfredatı - İnteraktif Öğrenme Uygulaması">
    
    <title>KPSS Tarih Öğrenme</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231a1a2e' width='180' height='180'/><text x='50%' y='50%' font-size='90' fill='%23ffd700' text-anchor='middle' dominant-baseline='middle' font-family='Arial' font-weight='bold'>⚔</text></svg>">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    
    <!-- Leaflet (Harita) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>
    <!-- Main App Container -->
    <div id="app" class="app-container">
        <!-- Loading Screen -->
        <div id="loading" class="loading-screen">
            <div class="spinner"></div>
            <p>Yükleniyor...</p>
        </div>
        
        <!-- Main Content (dynamically rendered) -->
        <div id="main-content" class="hidden"></div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <!-- Modüller (Order önemli!) -->
    <script src="config.js"></script>
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/modules/contentPool.js"></script>
    <script src="js/modules/userProgress.js"></script>
    <script src="js/modules/gameEngine.js"></script>
    <script src="js/modules/geoServices.js"></script>
    <script src="js/modules/uiRenderer.js"></script>
    <script src="js/modules/aiProvider.js"></script>
    <script src="js/modules/googleSheets.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('✅ Service Worker registered'))
                .catch(err => console.warn('⚠️ SW registration failed:', err));
        }
    </script>
</body>
</html>
